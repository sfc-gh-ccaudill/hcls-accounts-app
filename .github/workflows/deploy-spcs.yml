name: Deploy to SPCS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SNOWFLAKE_ACCOUNT: sfsenorthamerica-ccaudill-aws2
  REGISTRY_URL: sfsenorthamerica-ccaudill-aws2.registry.snowflakecomputing.com
  IMAGE_PATH: /hcls_accounts/public/images/hcls-accounts-app
  SERVICE_NAME: HCLS_ACCOUNTS.PUBLIC.HCLS_ACCOUNTS_APP

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Snowflake Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.SNOWFLAKE_USER }}
          password: ${{ secrets.SNOWFLAKE_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}${{ env.IMAGE_PATH }}:latest
            ${{ env.REGISTRY_URL }}${{ env.IMAGE_PATH }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Snowflake CLI
        uses: Snowflake-Labs/snowflake-cli-action@v1
        with:
          default-config-file-path: .snowflake/config.toml

      - name: Create Snowflake config
        run: |
          mkdir -p ~/.snowflake
          cat > ~/.snowflake/config.toml << EOF
          [connections.default]
          account = "${{ env.SNOWFLAKE_ACCOUNT }}"
          user = "${{ secrets.SNOWFLAKE_USER }}"
          password = "${{ secrets.SNOWFLAKE_PASSWORD }}"
          role = "SYSADMIN"
          warehouse = "COMPUTE_WH"
          EOF

      - name: Update SPCS Service
        run: |
          snow sql -q "
          ALTER SERVICE ${{ env.SERVICE_NAME }} FROM SPECIFICATION \$\$
          spec:
            containers:
            - name: hcls-accounts-app
              image: ${{ env.IMAGE_PATH }}:${{ github.sha }}
              env:
                HOSTNAME: \"0.0.0.0\"
                PORT: \"8000\"
                NODE_ENV: production
              resources:
                requests:
                  memory: 1Gi
                  cpu: 500m
                limits:
                  memory: 2Gi
                  cpu: 1000m
              readinessProbe:
                port: 8000
                path: /
            endpoints:
            - name: app
              port: 8000
              public: true
          \$\$;
          "

      - name: Verify deployment
        run: |
          echo "Waiting for service to update..."
          sleep 30
          snow sql -q "SELECT SYSTEM\$GET_SERVICE_STATUS('${{ env.SERVICE_NAME }}')"
